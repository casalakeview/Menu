Menu website casa

<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Casa Lake View Resort</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#4B5320;
    padding:60px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    color:#dcdcdc;
}

section{
    padding:30px 20px;
}

h2{
    color:#4B5320;
}

.food-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.food-card{
    background:#1b1b1b;
    border-radius:15px;
    padding:20px;
    border:1px solid #4B5320;
}

.food-name{
    font-size:20px;
    font-weight:bold;
}

.food-price{
    color:#9CAF50;
    margin-top:10px;
    font-size:18px;
}

.food-items div{
    background:#121212;
    padding:10px;
    margin:6px 0;
    border-radius:8px;
    display:flex;
    justify-content:space-between;
    border:1px solid rgba(75,83,32,0.3);
}

.food-items div span:last-child{
    color:#9CAF50;
    font-weight:bold;
}

h2{
    text-align:center;
    letter-spacing:2px;
}

div[onclick]{
    font-weight:bold;
    font-size:16px;
}

#categoryNav{
    display:flex;
    overflow-x:auto;
    gap:12px;
    padding:15px;
    margin-bottom:20px;
}

#categoryNav::-webkit-scrollbar{
    display:none;
}

.category-btn{
    background:#121212;
    color:white;
    border:2px solid #4B5320;
    border-radius:30px;
    padding:12px 20px;
    font-size:14px;
    font-weight:bold;
    cursor:pointer;
    white-space:nowrap;
    transition:0.3s;
}

.category-btn.active{
    background:#4B5320;
    color:white;
}

.category-btn:hover{
    background:#4B5320;
}

</style>

</head>

<body>

<header>

<h1>CASA LAKE VIEW RESORT</h1>

<p>Food Menu</p>

</header>

<div id="categoryNav">

    <button class="category-btn active"
        onclick="selectCategory(this)">
    FOOD
</button>

<button class="category-btn"
        onclick="selectCategory(this)">
    DRINKS
</button>

<button class="category-btn"
        onclick="selectCategory(this)">
    QUAD BIKES
</button>

<button class="category-btn"
        onclick="selectCategory(this)">
    BOAT RIDES
</button>

</div>

<div id="foodSections"></div>

<div id="drinksSections" style="display:none;">
</div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

db.collection("menu")
.where("archived", "==", false)
.onSnapshot(snapshot => {

    const foodContainer = document.getElementById("foodSections");
    const drinkContainer = document.getElementById("drinksSections");

    foodContainer.innerHTML = "";
    drinkContainer.innerHTML = "";

    const foodSections = {};
    const drinkSections = {};

    snapshot.forEach(doc => {
        const item = doc.data();

        if (!item.section) return;

        // 🍹 DRINKS
        if (item.category === "drink") {
            if (!drinkSections[item.section]) {
                drinkSections[item.section] = [];
            }
            drinkSections[item.section].push(item);
            return;
        }

        // 🍽 FOOD
        if (!foodSections[item.section]) {
            foodSections[item.section] = [];
        }
        foodSections[item.section].push(item);
    });

    // =========================
    // 🍽 FOOD RENDER
    // =========================

    let foodHTML = `<h2 style="color:#4B5320;text-align:center;">FOOD MENU</h2>`;

    Object.keys(foodSections).forEach(section => {

        foodHTML += `
        <div style="
            margin:10px 0;
            padding:12px;
            background:#1a1a1a;
            border-radius:10px;
            color:white;
            border:1px solid #4B5320;
        ">

            <div onclick="toggleFood(this)" style="cursor:pointer;font-weight:bold;">
                ${section}
            </div>

            <div class="food-items" style="display:none;margin-top:10px;">
        `;

        foodSections[section].forEach(food => {

            foodHTML += `
                <div style="
                    display:flex;
                    justify-content:space-between;
                    padding:8px 0;
                    border-bottom:1px solid #333;
                ">
                    <span>${food.name}</span>
                    <span style="color:#9CAF50;">
                        GHS ${Number(food.price).toFixed(2)}
                    </span>
                </div>
            `;
        });

        foodHTML += `</div></div>`;
    });

    foodContainer.innerHTML = foodHTML;

    // =========================
    // 🍹 DRINKS RENDER
    // =========================

    let drinkHTML = `<h2 style="color:#4B5320;text-align:center;">DRINKS MENU</h2>`;

    Object.keys(drinkSections).forEach(section => {

        drinkHTML += `
        <div style="
            margin:10px 0;
            padding:12px;
            background:#1a1a1a;
            border-radius:10px;
            color:white;
            border:1px solid #4B5320;
        ">

            <div style="font-weight:bold;">
                ${section}
            </div>

            <div style="margin-top:10px;">
        `;

        drinkSections[section].forEach(drink => {

            drinkHTML += `
                <div style="
                    display:flex;
                    justify-content:space-between;
                    padding:8px 0;
                    border-bottom:1px solid #333;
                ">
                    <span>${drink.name}</span>
                    <span style="color:#9CAF50;">
                        GHS ${Number(drink.price).toFixed(2)}
                    </span>
                </div>
            `;
        });

        drinkHTML += `</div></div>`;
    });

    drinkContainer.innerHTML = drinkHTML;
});

// =========================
// TOGGLE FOOD
// =========================

function toggleFood(element) {

    const allBoxes = document.querySelectorAll(".food-items");
    const currentBox = element.nextElementSibling;

    allBoxes.forEach(box => {
        if (box !== currentBox) {
            box.style.display = "none";
        }
    });

    currentBox.style.display =
        currentBox.style.display === "block"
        ? "none"
        : "block";
}

// =========================
// CATEGORY BUTTONS
// =========================

function selectCategory(button) {

    document.querySelectorAll(".category-btn")
        .forEach(btn => btn.classList.remove("active"));

    button.classList.add("active");

    const food = document.getElementById("foodSections");
    const drinks = document.getElementById("drinksSections");

    if (button.innerText.trim() === "FOOD") {
        food.style.display = "block";
        drinks.style.display = "none";
    }

    if (button.innerText.trim() === "DRINKS") {
        food.style.display = "none";
        drinks.style.display = "block";
    }
}

</script>

</body>

</html>
