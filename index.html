<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Casa Lake View Resort</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#4B5320;
    padding:60px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    color:#dcdcdc;
}

section{
    padding:30px 20px;
}

h2{
    color:#4B5320;
}

.food-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.food-card{
    background:#1b1b1b;
    border-radius:15px;
    padding:20px;
    border:1px solid #4B5320;
}

.food-name{
    font-size:20px;
    font-weight:bold;
}

.food-price{
    color:#9CAF50;
    margin-top:10px;
    font-size:18px;
}

</style>

</head>

<body>

<header>

<h1>CASA LAKE VIEW RESORT</h1>

<p>Food Menu</p>

</header>

<section>

<h2>Breakfast</h2>

<div class="food-grid">

<div class="food-card">

<div class="food-name">

Loading menu...

</div>

</div>

</div>

</section>

</body>

</html>
