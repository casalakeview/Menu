<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Casa Lake View Resort</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#4B5320;
    padding:60px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    color:#dcdcdc;
}

section{
    padding:30px 20px;
}

h2{
    color:#4B5320;
}

.food-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.food-card{
    background:#1b1b1b;
    border-radius:15px;
    padding:20px;
    border:1px solid #4B5320;
}

.food-name{
    font-size:20px;
    font-weight:bold;
}

.food-price{
    color:#9CAF50;
    margin-top:10px;
    font-size:18px;
}

</style>

</head>

<body>

<header>

<h1>CASA LAKE VIEW RESORT</h1>

<p>Food Menu</p>

</header>

<div id="foodSections"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyBrsJteLnC0AJsqQN2EDD07vXQX4MBveQk",
    authDomain: "casa-lake-view-resort.firebaseapp.com",
    projectId: "casa-lake-view-resort",
    storageBucket: "casa-lake-view-resort.firebasestorage.app",
    messagingSenderId: "783691618625",
    appId: "1:783691618625:web:fe6bf67bb4585947ce69c0",
    measurementId: "G-2SLSV010SB"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

db.collection("menu")
.where("category", "==", "food")
.where("archived", "==", false)
.onSnapshot(snapshot => {

    const container = document.getElementById("foodSections");
container.innerHTML = "";

const sections = {};

snapshot.forEach(doc => {
    const food = doc.data();

    if (!food.section) return;

    if (!sections[food.section]) {
        sections[food.section] = [];
    }

    sections[food.section].push(food);
});

let html = `<h2 style="color:#4B5320;text-align:center;">FOOD MENU</h2>`;

// We create each section
Object.keys(sections).forEach(section => {

    html += `
        <div style="
            margin:10px 0;
            padding:12px;
            background:#1a1a1a;
            border-radius:10px;
            color:white;
            border:1px solid #4B5320;
        ">

            <!-- SECTION TITLE (CLICKABLE) -->
            <div onclick="toggleFood(this)" style="
                cursor:pointer;
                font-weight:bold;
            ">
                ${section}
            </div>

            <!-- FOOD ITEMS (HIDDEN INITIALLY) -->
            <div class="food-items" style="display:none; margin-top:10px;">

    `;

    sections[section].forEach(food => {

        html += `
            <div style="
                display:flex;
                justify-content:space-between;
                padding:8px 0;
                border-bottom:1px solid #333;
            ">
                <span>${food.name}</span>
                <span style="color:#9CAF50;">
                    GHS ${Number(food.price).toFixed(2)}
                </span>
            </div>
        `;

    });

    html += `
            </div>
        </div>
    `;

});

container.innerHTML = html;

});

let openSection = null;

function toggleSection(id) {

    const el = document.getElementById(id);

    // close previous
    if (openSection && openSection !== id) {
        document.getElementById(openSection).style.display = "none";
    }

    // toggle current
    if (el.style.display === "block") {
        el.style.display = "none";
        openSection = null;
    } else {
        el.style.display = "block";
        openSection = id;
    }
}

function toggleFood(element) {

    const foodBox = element.nextElementSibling;

    if (foodBox.style.display === "block") {
        foodBox.style.display = "none";
    } else {
        foodBox.style.display = "block";
    }
}

</script>

</body>

</html>
