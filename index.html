<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Casa Lake View Resort</title>

<style>

body{
    margin:0;
    background:#0f0f0f;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#4B5320;
    padding:60px 20px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:40px;
}

header p{
    color:#dcdcdc;
}

section{
    padding:30px 20px;
}

h2{
    color:#4B5320;
}

.food-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));

    gap:20px;
}

.food-card{
    background:#1b1b1b;
    border-radius:15px;
    padding:20px;
    border:1px solid #4B5320;
}

.food-name{
    font-size:20px;
    font-weight:bold;
}

.food-price{
    color:#9CAF50;
    margin-top:10px;
    font-size:18px;
}

</style>

</head>

<body>

<header>

<h1>CASA LAKE VIEW RESORT</h1>

<p>Food Menu</p>

</header>

<div id="foodSections"></div>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>

<script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-firestore.js"></script>

<script>

const firebaseConfig = {
    apiKey: "AIzaSyBrsJteLnC0AJsqQN2EDD07vXQX4MBveQk",
    authDomain: "casa-lake-view-resort.firebaseapp.com",
    projectId: "casa-lake-view-resort",
    storageBucket: "casa-lake-view-resort.firebasestorage.app",
    messagingSenderId: "783691618625",
    appId: "1:783691618625:web:fe6bf67bb4585947ce69c0",
    measurementId: "G-2SLSV010SB"
};

firebase.initializeApp(firebaseConfig);

const db = firebase.firestore();

db.collection("menu")
.where("category", "==", "food")
.where("archived", "==", false)
.onSnapshot(snapshot => {

    const container =
        document.getElementById("foodSections");

    container.innerHTML = "";

    const sections = {};

    snapshot.forEach(doc => {

        const food = doc.data();

        if (!sections[food.section]) {
            sections[food.section] = [];
        }

        sections[food.section].push(food);

    });

    Object.keys(sections).forEach(section => {

        let html = `
            <section>

                <h2>${section}</h2>

                <div class="food-grid">
        `;

        sections[section].forEach(food => {

            html += `
                <div class="food-card">

                    <div class="food-name">

                        ${food.name}

                    </div>

                    <div class="food-price">

                        GHS ${Number(food.price).toFixed(2)}

                    </div>

                </div>
            `;

        });

        html += `
                </div>

            </section>
        `;

        container.innerHTML += html;

    });

});


</script>

</body>

</html>
